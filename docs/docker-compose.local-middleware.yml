name: smartask_local_middleware

services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: smartask-minio
    restart: unless-stopped
    ports:
      - "19000:19000"
      - "19001:19001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --address ":19000" --console-address ":19001"
    volumes:
      - smartask-minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: smartask-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:19000 minioadmin minioadmin >/dev/null 2>&1; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc alias set local http://minio:19000 minioadmin minioadmin &&
      mc mb --ignore-existing local/uploads &&
      mc anonymous set download local/uploads
      "
    restart: "no"

  kafka:
    image: apache/kafka:3.7.0
    container_name: smartask-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@smartask-kafka:9093
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://smartask-kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
    volumes:
      - smartask-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 18

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: smartask-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      /bin/bash -c "
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic file-processing-topic1 --replication-factor 1 --partitions 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic file-processing-dlt --replication-factor 1 --partitions 1
      "
    restart: "no"

  elasticsearch:
    image: elasticsearch:8.10.4
    container_name: smartask-es
    restart: unless-stopped
    ports:
      - "9201:9200"
    environment:
      ELASTIC_PASSWORD: PaiSmart2025
      node.name: pai-smart-es01
      discovery.type: single-node
      xpack.license.self_generated.type: basic
      xpack.security.enabled: "true"
      xpack.security.enrollment.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      cluster.name: pai-smart-es-cluster
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    volumes:
      - smartask-es-data:/usr/share/elasticsearch/data
    command: >
      bash -c "
      if ! elasticsearch-plugin list | grep -q 'analysis-ik'; then
        elasticsearch-plugin install --batch https://release.infinilabs.com/analysis-ik/stable/elasticsearch-analysis-ik-8.10.4.zip;
      fi;
      /usr/local/bin/docker-entrypoint.sh
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -fsu elastic:PaiSmart2025 http://localhost:9200/_cluster/health >/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 18

volumes:
  smartask-minio-data:
  smartask-kafka-data:
  smartask-es-data:

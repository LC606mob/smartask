spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smartask?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 1
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
  kafka:
    enabled: true
    bootstrap-servers: localhost:19092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      enable-idempotence: true
      transactional-id-prefix: file-upload-tx-
      properties:
        client.dns.lookup: use_all_dns_ips
    consumer:
      group-id: file-processing-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        client.dns.lookup: use_all_dns_ips
    topic:
      file-processing: file-processing-topic1
      dlt: file-processing-dlt
  webflux:
    client:
      max-in-memory-size: 16MB
  codec:
    max-in-memory-size: 16MB

minio:
  endpoint: http://localhost:19000
  accessKey: minioadmin
  secretKey: minioadmin
  bucketName: uploads
  publicUrl: http://localhost:19000

elasticsearch:
  host: localhost
  port: 9201
  scheme: http
  username: elastic
  password: 123456

logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.boot.autoconfigure.web.servlet: DEBUG
    org.springframework.security: DEBUG
    com.lcmob.smartask.service: DEBUG
    io.minio: DEBUG

log4j:
  logger:
    org:
      apache:
        tika: DEBUG

deepseek:
  api:
    url: https://api.deepseek.com
    model: deepseek-v4-pro
    key: ${DEEPSEEK_API_KEY:}

embedding:
  api:
    url: https://dashscope.aliyuncs.com/compatible-mode/v1
    key: ${DASHSCOPE_API_KEY:}
    model: text-embedding-v4
    batch-size: 10
    dimension: 2048
